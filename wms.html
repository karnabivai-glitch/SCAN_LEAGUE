<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WMS LEAGUE - Manajemen Gudang</title>
  
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
      getFirestore, collection, doc, getDocs, getDoc, addDoc, updateDoc, deleteDoc,
      query, where, onSnapshot, writeBatch, enableIndexedDbPersistence
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import {
      getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    
    // Konfigurasi Firebase Anda (GANTI DENGAN PUNYA ANDA)
    const firebaseConfig = {
  apiKey: "AIzaSyBbga_f0scLVVJSMj9nVkmZybxgpBTicdI",
  authDomain: "scan-wms-e8a3f.firebaseapp.com",
  projectId: "scan-wms-e8a3f",
  storageBucket: "scan-wms-e8a3f.firebasestorage.app",
  messagingSenderId: "1052999562779",
  appId: "1:1052999562779:web:26c8219b5fb2dbc816aabe"
};
    
    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    
    // Enable offline persistence
    enableIndexedDbPersistence(db).catch((err) => {
      if (err.code === 'failed-precondition') {
        console.warn('Multiple tabs open, persistence can only be enabled in one tab at a time.');
      } else if (err.code === 'unimplemented') {
        console.warn('The current browser does not support persistence.');
      }
    });
    
    // Expose to global window
    window.firebase = { db, auth, collection, doc, getDocs, getDoc, addDoc, updateDoc, deleteDoc, query, where, onSnapshot, writeBatch };
    window.firebaseAuth = { signInWithEmailAndPassword, signOut, onAuthStateChanged };
  </script>
  
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <style>
    /* ===== BASE STYLE (diambil dari WMS MULTI-STORE) ===== */
    :root {
      --sea-blue:  #006994;
      --deep-ocean:#004c6d;
      --accent:    #00c2ff;
      --bg-light:  #f0f4f8;
      --text-dark: #0f172a;
      --danger:    #dc2626;
      --warning:   #f59e0b;
      --success:   #10b981;
      --border:    #cbd5e1;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Space Grotesk', sans-serif; background: var(--bg-light); height: 100vh; overflow: hidden; }
    .hidden { display: none !important; }
    
    /* Loading Overlay */
    #loadingOverlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 10000; color: white;
      backdrop-filter: blur(4px);
    }
    .spinner {
      width: 52px; height: 52px;
      border: 5px solid rgba(255,255,255,0.2);
      border-radius: 50%; border-top-color: var(--accent);
      animation: spin 0.9s linear infinite;
      margin-bottom: 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* ===== LOGIN ===== */
    #loginOverlay {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, var(--deep-ocean) 0%, #002d42 100%);
      z-index: 9999; display: flex;
      align-items: center; justify-content: center;
    }
    .login-box {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(20px);
      text-align: center;
      padding: 44px 40px;
      border-radius: 20px;
      width: 340px;
    }
    .login-logo { font-size: 40px; margin-bottom: 8px; }
    .login-box h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 34px; font-weight: 800; color: white; letter-spacing: 3px; margin-bottom: 4px; }
    .login-sub { color: rgba(255,255,255,0.45); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 28px; }
    .login-box input {
      width: 100%; padding: 13px 16px; margin-bottom: 12px;
      border-radius: 10px; border: 1.5px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1); color: white;
      font-family: inherit; font-size: 14px; outline: none;
    }
    .login-box input::placeholder { color: rgba(255,255,255,0.4); }
    .login-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,194,255,0.2); }
    .btn-login {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      background: var(--accent); color: #003d52;
      font-weight: 800; cursor: pointer; font-size: 16px;
      font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase;
      transition: 0.2s;
    }
    .btn-login:hover { background: white; }
    
    /* ===== APP LAYOUT ===== */
    #appContainer {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    
    /* Sidebar (sama seperti WMS MULTI-STORE) */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      background: var(--sea-blue);
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 20px;
      background: var(--deep-ocean);
      border-bottom: 2px solid rgba(255,255,255,0.1);
      text-align: center;
    }
    .sidebar-header h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 800; letter-spacing: 2px; }
    #displayStoreName { font-size: 13px; color: #ffeb3b; margin-top: 5px; font-weight: 700; }
    .sidebar-content {
      padding: 14px;
      overflow-y: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .input-card {
      background: rgba(255,255,255,0.1);
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .input-card p { margin: 0 0 8px 0; font-size: 13px; font-weight: 800; letter-spacing: 0.5px; }
    .input-card label { font-size: 12px; color: rgba(255,255,255,0.7); display: block; margin-bottom: 4px; }
    input, select {
      width: 100%; padding: 9px 11px; margin-bottom: 6px;
      border-radius: 7px; border: 1px solid var(--border);
      font-size: 15px; font-family: inherit; outline: none;
    }
    input:focus, select:focus { border-color: var(--sea-blue); box-shadow: 0 0 0 3px rgba(0,105,148,0.12); }
    .btn-primary {
      width: 100%; padding: 11px; border: none; border-radius: 8px;
      font-weight: 700; cursor: pointer; background: white;
      color: var(--sea-blue); text-transform: uppercase;
      font-size: 14px; transition: 0.2s;
    }
    .btn-primary:hover { background: var(--accent); color: white; }
    .btn-success {
      background: var(--success); color: white;
    }
    .btn-success:hover { background: #0d9488; }
    .btn-danger {
      background: var(--danger); color: white;
    }
    .btn-danger:hover { background: #b91c1c; }
    .btn-logout {
      background: rgba(220,38,38,0.15); color: #ffcccc;
      border: 1px solid rgba(255,150,150,0.3);
      padding: 10px; border-radius: 8px; cursor: pointer;
      font-size: 13px; margin-top: auto;
    }
    .btn-logout:hover { background: var(--danger); color: white; }
    
    .store-toggle {
      display: flex; gap: 6px; margin-bottom: 12px;
      background: rgba(0,0,0,0.2); padding: 4px; border-radius: 30px;
    }
    .store-toggle-btn {
      flex: 1; padding: 8px 0; border: none; border-radius: 25px;
      font-weight: 700; font-size: 13px; cursor: pointer;
      background: transparent; color: rgba(255,255,255,0.6);
    }
    .store-toggle-btn.active { background: white; color: var(--sea-blue); }
    
    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .top-navbar {
      height: 64px;
      background: var(--sea-blue);
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }
    #summary {
      font-weight: 700;
      font-size: 15px;
      background: rgba(0,0,0,0.2);
      padding: 8px 14px;
      border-radius: 8px;
    }
    .view-toggle {
      display: flex;
      gap: 8px;
      background: rgba(255,255,255,0.15);
      padding: 4px;
      border-radius: 40px;
    }
    .toggle-btn {
      padding: 8px 18px;
      border: none;
      border-radius: 30px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      background: transparent;
      color: white;
      transition: 0.25s;
    }
    .toggle-btn.active { background: white; color: var(--sea-blue); }
    .live-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 700;
      background: rgba(0,0,0,0.2);
      padding: 6px 13px;
      border-radius: 20px;
    }
    .dot {
      width: 9px; height: 9px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    
    .table-wrapper {
      flex: 1;
      overflow: auto;
      background: white;
    }
    
    /* ===== BIN CARDS VIEW (sama seperti WMS MULTI-STORE) ===== */
    .bin-cards-container { display: flex; flex-direction: column; gap: 12px; padding: 20px; background: white; min-height: 100%; }
    .bin-card-list {
      background: white; border-radius: 16px; padding: 18px 22px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      border-left: 8px solid var(--sea-blue);
      cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
      border: 1px solid #e2e8f0;
      transition: 0.2s;
    }
    .bin-card-list:hover { transform: translateX(5px); box-shadow: 0 6px 20px rgba(0,105,148,0.2); }
    .bin-card-left { display: flex; align-items: center; gap: 15px; }
    .bin-icon { font-size: 32px; }
    .bin-name { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 800; color: var(--deep-ocean); }
    .bin-store { font-size: 14px; color: #64748b; margin-top: 4px; }
    .bin-stats { text-align: right; }
    .bin-count { font-size: 36px; font-weight: 800; color: var(--sea-blue); line-height: 1; }
    .bin-count-label { font-size: 12px; color: #94a3b8; text-transform: uppercase; }
    
    /* ===== BIN DETAIL TABLE ===== */
    .bin-detail-header {
      background: var(--sea-blue); color: white;
      padding: 15px 25px;
      display: flex; align-items: center; gap: 20px;
      flex-shrink: 0;
    }
    .btn-back {
      background: rgba(255,255,255,0.2); border: none;
      color: white; padding: 8px 20px;
      border-radius: 30px; font-weight: 700; cursor: pointer;
    }
    .bin-detail-title { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 800; }
    
    .bin-detail-table {
      width: 100%;
      border-collapse: collapse;
    }
    .bin-detail-table th, .bin-detail-table td {
      padding: 12px 8px;
      border: 1px solid #e2e8f0;
      text-align: center;
    }
    .bin-detail-table th {
      background: #f1f5f9;
      font-weight: 700;
      position: sticky;
      top: 0;
    }
    .variant-cell { font-weight: 800; color: var(--deep-ocean); }
    .qty-cell { font-size: 18px; font-weight: 800; color: var(--sea-blue); }
    .action-cell { padding: 8px 6px; }
    .action-wrapper { display: flex; gap: 6px; align-items: center; justify-content: center; flex-wrap: wrap; }
    .qty-input { width: 60px; padding: 6px; text-align: center; border: 1px solid var(--border); border-radius: 5px; }
    .bin-input { width: 80px; padding: 6px; text-align: center; border: 1px solid var(--border); border-radius: 5px; text-transform: uppercase; }
    .btn-jual, .btn-move {
      padding: 6px 12px; border: none; border-radius: 5px;
      font-weight: 700; cursor: pointer; color: white;
    }
    .btn-jual { background: var(--danger); }
    .btn-move { background: var(--warning); }
    .btn-jual:hover, .btn-move:hover { opacity: 0.85; }
    
    /* ===== LAYOUT VIEW (DRAG & DROP) ===== */
    .bin-layout-wrapper {
      display: flex; flex-direction: column; height: 100%;
      overflow: hidden;
    }
    .bin-layout-toolbar {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 14px; background: #f8fafc;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; flex-wrap: wrap;
    }
    .blk-btn {
      padding: 6px 13px; border-radius: 20px;
      border: 1.5px solid var(--border);
      background: white; cursor: pointer;
      font-size: 12px; font-weight: 700;
    }
    .blk-btn.active { background: var(--sea-blue); color: white; border-color: var(--sea-blue); }
    .blk-btn.save { background: var(--success); color: white; }
    
    .floor-tabs {
      display: flex; gap: 4px; padding: 6px 14px;
      background: #eef2f7; border-bottom: 1px solid var(--border);
      flex-shrink: 0; align-items: center;
    }
    .floor-tab-btn {
      padding: 5px 16px; border-radius: 20px;
      border: 1.5px solid var(--border);
      background: white; cursor: pointer;
      font-size: 12px; font-weight: 700;
    }
    .floor-tab-btn.active { background: var(--sea-blue); color: white; }
    
    .layout-canvas-scroll {
      flex: 1; overflow: auto; position: relative;
    }
    .layout-canvas {
      position: relative; min-height: 400px;
      width: 100%; background-color: #f0f4f8;
      background-image: linear-gradient(rgba(0,105,148,0.06) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,105,148,0.06) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    .lbin-card {
      position: absolute;
      min-width: 80px; min-height: 60px;
      background: white;
      border: 2px solid var(--border);
      border-radius: 12px;
      cursor: grab;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      overflow: hidden;
    }
    .lbin-card.dragging { cursor: grabbing; opacity: 0.8; }
    .lbin-header {
      background: var(--sea-blue);
      border-radius: 10px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 6px 8px;
    }
    .lbin-bin-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px; font-weight: 800; color: white;
      text-align: center;
    }
    .lbin-count-badge {
      font-size: 9px; background: rgba(255,255,255,0.22);
      padding: 2px 7px; border-radius: 10px; margin-top: 4px;
    }
    .lbin-resize {
      position: absolute; bottom: 0; right: 0;
      width: 14px; height: 14px;
      cursor: se-resize;
      background: linear-gradient(135deg, transparent 50%, var(--border) 50%);
    }
    .lbin-delete {
      position: absolute; top: 4px; right: 4px;
      width: 18px; height: 18px;
      background: var(--danger); color: white;
      border: none; border-radius: 50%;
      font-size: 11px; cursor: pointer;
      display: none; align-items: center; justify-content: center;
    }
    .lbin-card.edit-mode .lbin-delete { display: flex; }
    .lbin-card.edit-mode { cursor: grab; }
    .lbin-alfa {
      font-size: 32px; font-weight: 800;
      text-align: center; padding: 8px;
      color: var(--sea-blue);
    }
    .layout-legend {
      display: flex; gap: 14px; padding: 5px 14px;
      background: white; border-top: 1px solid var(--border);
      font-size: 11px; flex-shrink: 0;
    }
    .leg-dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; margin-right: 4px; }
    
    /* Highlight untuk pencarian */
    .lbin-card.highlighted {
      outline: 3px solid #10b981;
      animation: pulse 1s infinite;
    }
    .lbin-card.search-dim { opacity: 0.25; }
    
    @keyframes pulse {
      0%,100% { outline-color: #10b981; }
      50% { outline-color: #34d399; outline-width: 5px; }
    }
    
    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 5000;
    }
    .modal-box {
      background: white; border-radius: 20px;
      width: 500px; max-width: 95vw; max-height: 85vh;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .modal-head {
      background: var(--sea-blue); color: white;
      padding: 16px 20px;
      display: flex; justify-content: space-between;
    }
    .modal-head-title { font-size: 22px; font-weight: 800; }
    .modal-close-btn {
      background: rgba(255,255,255,0.2); border: none;
      color: white; width: 32px; height: 32px;
      border-radius: 50%; cursor: pointer;
    }
    .modal-body { flex: 1; overflow-y: auto; padding: 0; }
    .modal-item-row {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px; border-bottom: 1px solid #f1f5f9;
    }
    .modal-item-row:hover { background: #f8fafc; }
    .modal-sku-badge {
      font-weight: 800; background: #dbeafe;
      padding: 4px 10px; border-radius: 8px;
      font-size: 13px;
    }
    .modal-item-info { flex: 1; }
    .modal-item-name { font-weight: 700; margin-bottom: 4px; }
    .modal-tag {
      font-size: 11px; padding: 2px 8px; border-radius: 20px;
      display: inline-block; margin-right: 4px;
    }
    .modal-footer {
      padding: 14px 20px; border-top: 1px solid #f1f5f9;
      display: flex; gap: 8px;
    }
    .modal-qty-input { width: 60px; padding: 6px; text-align: center; }
    .modal-btn-jual { background: var(--danger); color: white; padding: 6px 12px; border: none; border-radius: 5px; cursor: pointer; }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loadingOverlay">
  <div class="spinner"></div>
  <div id="loadingText">Memuat...</div>
</div>

<!-- LOGIN -->
<div id="loginOverlay">
  <div class="login-box">
    <div class="login-logo">📦</div>
    <h2>WMS LEAGUE</h2>
    <p class="login-sub">Warehouse Management System</p>
    <input type="text" id="emailLogin" placeholder="Email" autocomplete="off">
    <input type="password" id="passwordLogin" placeholder="Password" autocomplete="off">
    <button class="btn-login" onclick="doLogin()">Masuk →</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="appContainer" class="hidden">
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>WMS LEAGUE</h2>
      <div id="displayStoreName"></div>
    </div>
    <div class="sidebar-content">
      <div class="input-card">
        <p>FILTER TOKO</p>
        <div class="store-toggle">
          <button class="store-toggle-btn active" onclick="setStoreFilter('own')">🏠 TOKO SENDIRI</button>
          <button class="store-toggle-btn" onclick="setStoreFilter('all')">🌐 SEMUA TOKO</button>
        </div>
      </div>
      
      <div class="input-card">
        <p style="color:#ffeb3b">📥 INBOUND STOK</p>
        <input type="text" id="inboundSku" placeholder="Variant SKU (contoh: 11234567890)">
        <div style="display:flex;gap:5px">
          <input type="text" id="inboundBin" placeholder="BIN" style="flex:2">
          <input type="number" id="inboundQty" placeholder="QTY" style="flex:1" value="1">
        </div>
        <button class="btn-primary" onclick="inboundStock()">Tambah Stok</button>
      </div>
      
      <div class="input-card">
        <p style="color:#10b981">📥 DOWNLOAD DATA</p>
        <button class="btn-success" onclick="downloadExcel()">📊 Download Excel Toko Ini</button>
      </div>
      <!-- Di wms.html, tambahkan di sidebar -->
<button class="btn btn-ghost" onclick="window.location.href='index.html'" style="margin-top:10px">
  <i class="fas fa-qrcode"></i> KEMBALI KE SCAN
</button>
      
      <button class="btn-logout" onclick="logoutSystem()">🔒 LOGOUT</button>
    </div>
  </div>
  
  <div class="main-content">
    <div class="top-navbar">
      <div id="summary">Memuat data...</div>
      <div class="view-toggle">
        <button class="toggle-btn active" onclick="setViewMode('bin')">📦 BIN CARD</button>
        <button class="toggle-btn" onclick="setViewMode('layout')">🗺️ LAYOUT</button>
      </div>
      <div class="live-indicator"><span>LIVE</span><div class="dot"></div></div>
    </div>
    <div class="table-wrapper" id="mainContent"></div>
  </div>
</div>

<!-- MODAL DETAIL BIN -->
<div id="binModal" class="modal-overlay" style="display:none" onclick="closeBinModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-head">
      <div>
        <div class="modal-head-title" id="modalBinTitle">BIN —</div>
        <div class="modal-head-sub" id="modalBinSub"></div>
      </div>
      <button class="modal-close-btn" onclick="document.getElementById('binModal').style.display='none'">✕</button>
    </div>
    <div class="modal-body" id="modalBinBody"></div>
    <div class="modal-footer" id="modalBinFooter"></div>
  </div>
</div>

<script type="module">
  // =============================================
  // FIREBASE INTEGRATION - WMS DASHBOARD
  // =============================================
  
  // Global state
  let allData = [];           // Data stok dari Firestore
  let currentUser = null;
  let currentStoreCode = null;
  let userRole = "TOKO";
  let storeFilterMode = "own";
  let viewMode = "bin";
  let selectedBinDetail = null;
  let layoutPositions = {};
  let layoutEditMode = false;
  let currentLayoutFloor = 1;
  let floorNames = { "default": ["Lantai 1"] };
  let layoutDirty = false;
  let layoutSearchHL = new Set();
  let layoutSearchHL_items = {};
  let allStores = [];
  let unsubscribeStock = null;

  // ========== AUTH ==========
  window.doLogin = async function() {
    const email = document.getElementById("emailLogin").value.trim();
    const password = document.getElementById("passwordLogin").value;
    if (!email || !password) return alert("Isi email dan password!");
    
    showLoading("Login...");
    try {
      const userCredential = await window.firebaseAuth.signInWithEmailAndPassword(
        window.firebase.auth, email, password
      );
      currentUser = userCredential.user;
      
      // Ambil data user dari Firestore
      const userDoc = await window.firebase.getDoc(
        window.firebase.doc(window.firebase.db, "users", currentUser.uid)
      );
      const userData = userDoc.data();
      currentStoreCode = userData?.storeCode || email.split('@')[0].toUpperCase();
      userRole = userData?.role || "TOKO";
      
      // Tampilkan UI
      document.getElementById("loginOverlay").style.display = "none";
      document.getElementById("appContainer").classList.remove("hidden");
      document.getElementById("displayStoreName").innerText = `📦 ${currentStoreCode} (${userRole})`;
      
      // Inisialisasi
      await loadAllStores();
      await loadLayoutFromFirestore();
      startStockListener();
      
      hideLoading();
    } catch (err) {
      hideLoading();
      alert("Login gagal: " + err.message);
    }
  };
  
  window.logoutSystem = async function() {
    if (!confirm("Keluar dari sistem?")) return;
    if (unsubscribeStock) unsubscribeStock();
    await window.firebaseAuth.signOut(window.firebase.auth);
    currentUser = null;
    document.getElementById("appContainer").classList.add("hidden");
    document.getElementById("loginOverlay").style.display = "flex";
    document.getElementById("emailLogin").value = "";
    document.getElementById("passwordLogin").value = "";
  };
  
  // ========== LOAD STORES ==========
  async function loadAllStores() {
    const storesSnapshot = await window.firebase.getDocs(
      window.firebase.collection(window.firebase.db, "stores")
    );
    allStores = storesSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
  }
  
  // ========== STOCK LISTENER (REALTIME) ==========
  function startStockListener() {
    if (unsubscribeStock) unsubscribeStock();
    
    let q;
    if (userRole === "ADMIN" && storeFilterMode === "all") {
      q = window.firebase.collection(window.firebase.db, "stock");
    } else {
      q = window.firebase.query(
        window.firebase.collection(window.firebase.db, "stock"),
        window.firebase.where("storeCode", "==", currentStoreCode)
      );
    }
    
    unsubscribeStock = window.firebase.onSnapshot(q, (snapshot) => {
      allData = [];
      snapshot.forEach(doc => {
        const data = doc.data();
        allData.push([
          data.storeCode,
          data.storeName || data.storeCode,
          data.generic || "",
          data.cat || "",
          data.variant || "",
          data.name || "",
          data.sizeUS || "",
          data.sizeUK || "",
          data.bin || "",
          data.qty || 0,
          doc.id
        ]);
      });
      
      // Filter data yang valid
      allData = allData.filter(row => row[8] && row[9] > 0);
      
      console.log("📊 Data update:", allData.length, "items");
      
      // Refresh tampilan
      if (viewMode === "bin") {
        if (selectedBinDetail) {
          const binData = allData.filter(r => r[8] === selectedBinDetail);
          renderBinDetail(binData);
        } else {
          renderBinCards();
        }
      } else if (viewMode === "layout") {
        renderLayoutCanvas();
      }
      
      updateSummary();
    }, (err) => {
      console.error("Listener error:", err);
    });
  }
  
  // ========== HELPER ==========
  function filterDataByStore(data) {
    if (storeFilterMode === "own") {
      return data.filter(row => row[0] === currentStoreCode);
    }
    return data;
  }
  
  function updateSummary() {
    const filtered = filterDataByStore(allData);
    const totalQty = filtered.reduce((s, r) => s + (r[9] || 0), 0);
    const totalItems = filtered.length;
    const el = document.getElementById("summary");
    if (el) el.innerText = `${totalItems} item | Qty: ${totalQty}`;
  }
  
  window.setStoreFilter = function(mode) {
    storeFilterMode = mode;
    document.querySelectorAll('.store-toggle-btn').forEach((btn, i) => {
      btn.classList.toggle('active', (i === 0 && mode === 'own') || (i === 1 && mode === 'all'));
    });
    selectedBinDetail = null;
    
    // Restart listener dengan filter baru
    startStockListener();
  };
  
  // ========== BIN CARDS VIEW ==========

      if (!binGroups[key]) {
        binGroups[key] = {
          bin, store: row[1], storeCode: row[0],
          totalQty: 0, uniqueSkus: new Set()

      }
      binGroups[key].totalQty += row[9];
      binGroups[key].uniqueSkus.add(row[4]);
    });

  // ========== STOCK OPERATIONS (Firestore) ==========
  window.inboundStock = async function() {
    const sku = document.getElementById("inboundSku").value.trim().toUpperCase();
    const bin = document.getElementById("inboundBin").value.trim().toUpperCase();
    const qty = parseInt(document.getElementById("inboundQty").value);
    
    if (!sku || !bin || !qty || qty <= 0) {
      alert("Isi SKU, BIN, dan QTY yang valid!");
      return;
    }
    
    showLoading("Menambah stok...");
    try {
      // Cari apakah sudah ada
      const q = window.firebase.query(
        window.firebase.collection(window.firebase.db, "stock"),
        window.firebase.where("storeCode", "==", currentStoreCode),
        window.firebase.where("variant", "==", sku),
        window.firebase.where("bin", "==", bin)
      );
      const snapshot = await window.firebase.getDocs(q);
      
      if (!snapshot.empty) {
        // Update existing
        const docRef = snapshot.docs[0].ref;
        const oldQty = snapshot.docs[0].data().qty || 0;
        await window.firebase.updateDoc(docRef, { qty: oldQty + qty });
      } else {
        // Create new
        await window.firebase.addDoc(window.firebase.collection(window.firebase.db, "stock"), {
          storeCode: currentStoreCode,
          storeName: currentStoreCode,
          variant: sku,
          name: sku,
          bin: bin,
          qty: qty,
          sizeUS: sku.slice(-3) || "",
          sizeUK: "-",
          generic: "",
          cat: "",
          createdAt: new Date().toISOString()
        });
      }
      
      document.getElementById("inboundSku").value = "";
      document.getElementById("inboundBin").value = "";
      document.getElementById("inboundQty").value = "1";
      hideLoading();
      alert("✅ Stok berhasil ditambahkan!");
    } catch (err) {
      hideLoading();
      alert("Gagal: " + err.message);
    }
  };
  
  window.jualStock = async function(sku, bin, storeCode, idx) {
    const qtyInput = document.getElementById(`detail_qty_${idx}`);
    if (!qtyInput) return;
    const qty = parseInt(qtyInput.value);
    if (!qty || qty <= 0) return alert("QTY tidak valid!");
    if (!confirm(`Jual ${sku} x${qty} dari BIN ${bin}?`)) return;
    
    showLoading("Memproses...");
    try {
      const q = window.firebase.query(
        window.firebase.collection(window.firebase.db, "stock"),
        window.firebase.where("storeCode", "==", storeCode),
        window.firebase.where("variant", "==", sku),
        window.firebase.where("bin", "==", bin)
      );
      const snapshot = await window.firebase.getDocs(q);
      if (snapshot.empty) throw new Error("Data tidak ditemukan");
      
      const docRef = snapshot.docs[0].ref;
      const currentQty = snapshot.docs[0].data().qty || 0;
      if (currentQty < qty) throw new Error("Stok tidak cukup!");
      
      const newQty = currentQty - qty;
      if (newQty === 0) {
        await window.firebase.deleteDoc(docRef);
      } else {
        await window.firebase.updateDoc(docRef, { qty: newQty });
      }
      
      hideLoading();
      alert("✅ Penjualan berhasil!");
    } catch (err) {
      hideLoading();
      alert("Gagal: " + err.message);
    }
  };
  
  window.moveStock = async function(sku, binAsal, storeCode, idx) {
    const qtyInput = document.getElementById(`detail_qty_${idx}`);
    const binTujuanInput = document.getElementById(`detail_movebin_${idx}`);
    if (!qtyInput || !binTujuanInput) return;
    
    const qty = parseInt(qtyInput.value);
    const binTujuan = binTujuanInput.value.trim().toUpperCase();
    if (!qty || qty <= 0) return alert("QTY tidak valid!");
    if (!binTujuan) return alert("Isi BIN tujuan!");
    if (binTujuan === binAsal) return alert("BIN tujuan sama dengan asal!");
    if (!confirm(`Pindah ${sku} x${qty} dari ${binAsal} ke ${binTujuan}?`)) return;
    
    showLoading("Memindahkan...");
    try {
      const batch = window.firebase.writeBatch(window.firebase.db);
      
      // Kurangi dari asal
      const qAsal = window.firebase.query(
        window.firebase.collection(window.firebase.db, "stock"),
        window.firebase.where("storeCode", "==", storeCode),
        window.firebase.where("variant", "==", sku),
        window.firebase.where("bin", "==", binAsal)
      );
      const snapAsal = await window.firebase.getDocs(qAsal);
      if (snapAsal.empty) throw new Error("Data asal tidak ditemukan");
      
      const docAsal = snapAsal.docs[0];
      const currentQty = docAsal.data().qty || 0;
      if (currentQty < qty) throw new Error("Stok asal tidak cukup!");
      
      const newQtyAsal = currentQty - qty;
      if (newQtyAsal === 0) {
        batch.delete(docAsal.ref);
      } else {
        batch.update(docAsal.ref, { qty: newQtyAsal });
      }
      
      // Tambah ke tujuan
      const qTujuan = window.firebase.query(
        window.firebase.collection(window.firebase.db, "stock"),
        window.firebase.where("storeCode", "==", storeCode),
        window.firebase.where("variant", "==", sku),
        window.firebase.where("bin", "==", binTujuan)
      );
      const snapTujuan = await window.firebase.getDocs(qTujuan);
      
      if (!snapTujuan.empty) {
        const docTujuan = snapTujuan.docs[0];
        const newQtyTujuan = (docTujuan.data().qty || 0) + qty;
        batch.update(docTujuan.ref, { qty: newQtyTujuan });
      } else {
        const newRef = window.firebase.doc(window.firebase.collection(window.firebase.db, "stock"));
        batch.set(newRef, {
          storeCode: storeCode,
          storeName: storeCode,
          variant: sku,
          name: sku,
          bin: binTujuan,
          qty: qty,
          sizeUS: sku.slice(-3) || "",
          sizeUK: "-",
          generic: "",
          cat: "",
          createdAt: new Date().toISOString()
        });
      }
      
      await batch.commit();
      hideLoading();
      alert("✅ Pemindahan berhasil!");
    } catch (err) {
      hideLoading();
      alert("Gagal: " + err.message);
    }
  };
  
  // ========== LAYOUT VIEW ==========
  async function loadLayoutFromFirestore() {
    try {
      const layoutDoc = await window.firebase.getDoc(
        window.firebase.doc(window.firebase.db, "layouts", currentStoreCode)
      );
      if (layoutDoc.exists()) {
        const data = layoutDoc.data();
        layoutPositions = data.positions || {};
        floorNames[currentStoreCode] = data.floors || ["Lantai 1"];
        if (floorNames[currentStoreCode].length === 0) floorNames[currentStoreCode] = ["Lantai 1"];
      } else {
        floorNames[currentStoreCode] = ["Lantai 1"];
      }
    } catch (err) {
      console.error("Load layout error:", err);
      floorNames[currentStoreCode] = ["Lantai 1"];
    }
  }
  
  async function saveLayoutToFirestore() {
    showLoading("Menyimpan layout...");
    try {
      const layoutRef = window.firebase.doc(window.firebase.db, "layouts", currentStoreCode);
      await window.firebase.setDoc(layoutRef, {
        positions: layoutPositions,
        floors: floorNames[currentStoreCode],
        updatedAt: new Date().toISOString()
      }, { merge: true });
      layoutDirty = false;
      hideLoading();
      alert("✅ Layout tersimpan!");
    } catch (err) {
      hideLoading();
      alert("Gagal simpan: " + err.message);
    }
  }
  
  function buildBinGroupsForLayout() {
    const filtered = filterDataByStore(allData);
    const groups = {};
    filtered.forEach(row => {
      const key = row[0] + "|" + row[8];
      if (!groups[key]) {
        groups[key] = {
          storeCode: row[0], storeName: row[1],
          bin: row[8], items: [], totalQty: 0
        };
      }
      groups[key].items.push(row);
      groups[key].totalQty += row[9];
    });
    return groups;
  }

  let dragState = null;
  function startDrag(e, lk) {
    e.preventDefault();
    const card = e.currentTarget;
    const rect = card.getBoundingClientRect();
    dragState = { lk, startX: e.clientX, startY: e.clientY, startLeft: parseInt(card.style.left), startTop: parseInt(card.style.top), moved: false };
    
    function onMove(mv) {
      const dx = mv.clientX - dragState.startX;
      const dy = mv.clientY - dragState.startY;
      const newLeft = Math.max(0, dragState.startLeft + dx);
      const newTop = Math.max(0, dragState.startTop + dy);
      card.style.left = newLeft + "px";
      card.style.top = newTop + "px";
      dragState.moved = true;
    }
    
    function onUp() {
      if (dragState && dragState.moved && layoutPositions[lk]) {
        layoutPositions[lk].x = parseInt(card.style.left);
        layoutPositions[lk].y = parseInt(card.style.top);
        layoutDirty = true;
      }
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
      dragState = null;
    }
    
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  }
  
  function startResize(e, lk) {
    e.preventDefault();
    const card = e.target.parentElement;
    const startX = e.clientX, startY = e.clientY;
    const startW = layoutPositions[lk]?.w || CARD_W;
    const startH = layoutPositions[lk]?.h || CARD_H;
    
    function onMove(mv) {
      const dw = mv.clientX - startX;
      const dh = mv.clientY - startY;
      const nw = Math.max(80, startW + dw);
      const nh = Math.max(60, startH + dh);
      card.style.width = nw + "px";
      card.style.height = nh + "px";
      if (layoutPositions[lk]) {
        layoutPositions[lk].w = nw;
        layoutPositions[lk].h = nh;
      }
      layoutDirty = true;
    }
    
    function onUp() {
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
    }
    
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  }
  
  window.toggleLayoutEdit = function() {
    layoutEditMode = !layoutEditMode;
    renderLayoutCanvas();
  };
  
  window.switchLayoutFloor = function(floor) {
    currentLayoutFloor = floor;
    renderLayoutCanvas();
  };
  
  window.addLayoutFloor = function() {
    const floors = floorNames[currentStoreCode];
    const newName = "Lantai " + (floors.length + 1);
    floors.push(newName);
    floorNames[currentStoreCode] = floors;
    currentLayoutFloor = floors.length;
    layoutDirty = true;
    renderLayoutCanvas();
  };
  
  window.deleteLayoutFloor = function() {
    const floors = floorNames[currentStoreCode];
    if (floors.length <= 1) return alert("Minimal 1 lantai!");
    if (!confirm(`Hapus ${floors[currentLayoutFloor - 1]}?`)) return;
    floors.splice(currentLayoutFloor - 1, 1);
    floorNames[currentStoreCode] = floors;
    if (currentLayoutFloor > floors.length) currentLayoutFloor = floors.length;
    layoutDirty = true;
    renderLayoutCanvas();
  };
  
  window.deleteBinFromLayout = function(lk) {
    if (!confirm("Hapus bin ini dari layout?")) return;
    delete layoutPositions[lk];
    layoutDirty = true;
    renderLayoutCanvas();
  };
  
  window.layoutSearch = function(val) {
    const q = val.toLowerCase();
    if (!q) {
      layoutSearchHL.clear();
      layoutSearchHL_items = {};
    } else {
      const binGroups = buildBinGroupsForLayout();
      layoutSearchHL.clear();
      layoutSearchHL_items = {};
      Object.keys(binGroups).forEach(key => {
        const bg = binGroups[key];
        let hit = bg.bin.toLowerCase().includes(q);
        bg.items.forEach(item => {
          if (String(item[4] || "").toLowerCase().includes(q) || 
              String(item[5] || "").toLowerCase().includes(q)) {
            hit = true;
            if (!layoutSearchHL_items[key]) layoutSearchHL_items[key] = new Set();
            layoutSearchHL_items[key].add(item[4]);
          }
        });
        if (hit) layoutSearchHL.add(key);
      });
    }
    renderLayoutCanvas();
  };
  
  window.layoutClearSearch = function() {
    document.getElementById("layoutSearch").value = "";
    layoutSearchHL.clear();
    layoutSearchHL_items = {};
    renderLayoutCanvas();
  };
  
  function openBinModalFromLayout(lk, bg) {
    const parts = lk.split("|");
    const binCode = bg.bin;
    const items = bg.items;
    const totalQty = bg.totalQty;
    
    document.getElementById("modalBinTitle").textContent = `BIN ${binCode}`;
    document.getElementById("modalBinSub").textContent = `${bg.storeName} — ${items.length} item, total ${totalQty} pcs`;
    
    let bodyHtml = "";
    items.forEach((row, idx) => {
      const canEdit = userRole === "ADMIN" || row[0] === currentStoreCode;
      bodyHtml += `
        <div class="modal-item-row">
          <span class="modal-sku-badge">${row[4]}</span>
          <div class="modal-item-info">
            <div class="modal-item-name">${row[5]}</div>
            <div>
              <span class="modal-tag">US ${row[6]}</span>
              <span class="modal-tag">UK ${row[7]}</span>
              <span class="modal-tag">Qty: ${row[9]}</span>
            </div>
          </div>
          ${canEdit ? `
            <div style="display:flex;gap:5px;">
              <input type="number" id="modal_qty_${idx}" class="modal-qty-input" value="1" min="1" max="${row[9]}" style="width:60px">
              <button class="modal-btn-jual" onclick="modalJual('${row[4]}', '${row[8]}', '${row[0]}', ${idx})">JUAL</button>
            </div>
          ` : `<span>🔒</span>`}
        </div>
      `;
    });
    
    document.getElementById("modalBinBody").innerHTML = bodyHtml || '<div class="modal-empty">Bin kosong</div>';
    document.getElementById("modalBinFooter").innerHTML = '<button class="blk-btn" onclick="document.getElementById(\'binModal\').style.display=\'none\'">Tutup</button>';
    document.getElementById("binModal").style.display = "flex";
  }
  
  window.modalJual = async function(sku, bin, storeCode, idx) {
    const qtyInput = document.getElementById(`modal_qty_${idx}`);
    if (!qtyInput) return;
    const qty = parseInt(qtyInput.value);
    if (!qty || qty <= 0) return alert("QTY tidak valid!");
    if (!confirm(`Jual ${sku} x${qty}?`)) return;
    
    document.getElementById("binModal").style.display = "none";
    showLoading("Memproses...");
    try {
      const q = window.firebase.query(
        window.firebase.collection(window.firebase.db, "stock"),
        window.firebase.where("storeCode", "==", storeCode),
        window.firebase.where("variant", "==", sku),
        window.firebase.where("bin", "==", bin)
      );
      const snapshot = await window.firebase.getDocs(q);
      if (snapshot.empty) throw new Error("Data tidak ditemukan");
      
      const docRef = snapshot.docs[0].ref;
      const currentQty = snapshot.docs[0].data().qty || 0;
      if (currentQty < qty) throw new Error("Stok tidak cukup!");
      
      const newQty = currentQty - qty;
      if (newQty === 0) {
        await window.firebase.deleteDoc(docRef);
      } else {
        await window.firebase.updateDoc(docRef, { qty: newQty });
      }
      
      hideLoading();
      alert("✅ Penjualan berhasil!");
    } catch (err) {
      hideLoading();
      alert("Gagal: " + err.message);
    }
  };
  
  function closeBinModal(e) {
    if (e.target === document.getElementById("binModal"))
      document.getElementById("binModal").style.display = "none";
  }
  window.closeBinModal = closeBinModal;
  
  // ========== EXPORT EXCEL ==========
  window.downloadExcel = function() {
    const filtered = filterDataByStore(allData);
    if (filtered.length === 0) return alert("Tidak ada data!");
    
    const headers = ["Store Code", "Store Name", "Generic", "Cat", "Variant", "Name", "Size US", "Size UK", "Bin", "Qty"];
    const wsData = [headers];
    filtered.forEach(row => {
      wsData.push([row[0], row[1], row[2], row[3], row[4], row[5], row[6], row[7], row[8], row[9]]);
    });
    
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(wsData);
    XLSX.utils.book_append_sheet(wb, ws, "WMS Data");
    XLSX.writeFile(wb, `WMS_${currentStoreCode}_${new Date().toISOString().slice(0,10)}.xlsx`);
  };
  
  window.setViewMode = function(mode) {
    viewMode = mode;
    document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
    if (mode === 'bin') {
      document.querySelector('.toggle-btn:first-child').classList.add('active');
      if (selectedBinDetail) {
        const binData = filterDataByStore(allData).filter(r => r[8] === selectedBinDetail);
        renderBinDetail(binData);
      } else {
        renderBinCards();
      }
    } else {
      document.querySelector('.toggle-btn:last-child').classList.add('active');
      renderLayoutCanvas();
    }
  };
  
  // Expose to window
  window.setStoreFilter = setStoreFilter;
  window.setViewMode = setViewMode;
  window.showBinDetail = showBinDetail;
  window.backToBinCards = backToBinCards;
  window.jualStock = jualStock;
  window.moveStock = moveStock;
  window.inboundStock = inboundStock;
  window.downloadExcel = downloadExcel;
  window.saveLayoutToFirestore = saveLayoutToFirestore;
  window.toggleLayoutEdit = toggleLayoutEdit;
  window.switchLayoutFloor = switchLayoutFloor;
  window.addLayoutFloor = addLayoutFloor;
  window.deleteLayoutFloor = deleteLayoutFloor;
  window.deleteBinFromLayout = deleteBinFromLayout;
  window.layoutSearch = layoutSearch;
  window.layoutClearSearch = layoutClearSearch;
  window.modalJual = modalJual;
  
  // Cek auth state
  window.firebaseAuth.onAuthStateChanged(window.firebase.auth, (user) => {
    if (user && !currentUser) {
      // Auto login jika sudah login sebelumnya
      window.doLogin = null; // Biarkan user login manual
    }
  });
</script>
